<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard | nexa pedia h2h</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f7f9fc; color: #1b254b; }
        
        .navbar { background: #fff; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eef2f6; }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { color: #a3aed0; font-size: 20px; cursor: pointer; }
        .navbar h2 { font-size: 18px; font-weight: 800; color: #1b254b; }

        .sidebar { position: fixed; top: 0; left: -285px; width: 285px; height: 100vh; background: #111c44; color: #fff; padding: 35px 25px; transition: 0.4s; z-index: 2000; }
        .sidebar.open { left: 0; }
        .side-label { font-size: 11px; color: #4e5d78; font-weight: 800; text-transform: uppercase; margin: 25px 0 10px 5px; display: block; }
        .side-item { padding: 14px 18px; border-radius: 14px; margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 14px; color: #a3aed0; }
        .side-item:hover { background: rgba(255,255,255,0.08); color: #fff; }

        .main-container { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .banner-balance { background: linear-gradient(135deg, #0f172a, #1e3a8a, #4318ff); border-radius: 28px; padding: 35px; color: white; margin-bottom: 30px; position: relative; overflow: hidden; }
        .banner-balance h1 { font-size: 36px; font-weight: 800; margin: 10px 0; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 26px; border-radius: 28px; border: 1px solid #eef2f6; }
        .val { font-size: 28px; font-weight: 800; color: #1b254b; margin: 8px 0; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); display: none; z-index: 1500; }
        .overlay.show { display: block; }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; max-width: 400px; background: white; border-radius: 30px; padding: 30px; display: none; z-index: 3000; opacity: 0; transition: 0.3s; }
        .modal.show { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .info-row { margin-bottom: 15px; }
        .info-row label { font-size: 10px; font-weight: 800; color: #a3aed0; text-transform: uppercase; }
        .api-box { background: #f4f7fe; padding: 12px; border-radius: 12px; border: 2px dashed #4318ff; cursor: pointer; font-family: monospace; color: #4318ff; font-size: 12px; text-align: center; margin-top: 5px; }
        .btn-act { width: 100%; padding: 15px; background: #1b254b; color: white; border: none; border-radius: 15px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eef2f6; margin-top: 5px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-left"><i class="fa-solid fa-bars-staggered menu-btn" onclick="toggleS()"></i> <h2>NEXA PEDIA</h2></div>
        <div class="nav-right"><i class="fa-solid fa-circle-user" style="font-size: 28px; color: #a3aed0; cursor: pointer;" onclick="openM('mP')"></i></div>
    </div>

    <div class="sidebar" id="sb">
        <h2 style="margin-bottom:40px;"><span>NEXA</span>PEDIA</h2>
        <span class="side-label">H2H</span>
        <div class="side-item" onclick="openM('mQ')"><i class="fa-solid fa-qrcode"></i> QRIS</div>
        <span class="side-label">SETTING</span>
        <div class="side-item" onclick="openM('mP')"><i class="fa-solid fa-user-gear"></i> Profile</div>
        <div class="side-item" onclick="logout()" style="color: #ee5d50; margin-top: 30px;"><i class="fa-solid fa-lock"></i> Logout</div>
    </div>

    <div class="overlay" id="ov" onclick="closeAll()"></div>

    <div class="modal" id="mP">
        <h3 style="text-align:center; margin-bottom:20px;">Detail Profile</h3>
        <div class="info-row"><label>Username</label><p id="m-n">-</p></div>
        <div class="info-row"><label>Email</label><p id="m-e">-</p></div>
        <div class="info-row"><label>API Key</label><div class="api-box" onclick="copyAPI()"><span id="m-api">loading...</span></div></div>
        <button class="btn-act" onclick="closeAll()">Tutup</button>
    </div>

    <div class="modal" id="mQ">
        <h3 style="text-align:center; margin-bottom:20px;">Buat QRIS</h3>
        <div class="info-row">
            <label>Nominal (Fee +250)</label>
            <input type="number" id="inNom" placeholder="Contoh: 5000">
        </div>
        <div id="qRes" style="display:none; text-align:center; margin-bottom:15px;">
            <img id="qImg" src="" style="width:180px; border-radius:10px; margin-bottom:10px;">
            <p id="qStat" style="font-size:12px; font-weight:800; color:#ffb547;">PENDING</p>
        </div>
        <button class="btn-act" id="btnQ" onclick="createQris()">Proses Sekarang</button>
        <button class="btn-act" style="background:#f4f7fe; color:#1b254b;" onclick="closeAll()">Batal</button>
    </div>

    <div class="main-container">
        <div class="banner-balance">
            <p>SELAMAT DATANG</p>
            <h1 id="p-u">---</h1>
            <div style="margin-top:25px;"><p>TOTAL SALDO</p><h1>Rp 0</h1></div>
        </div>
        <div class="grid-stats">
            <div class="stat-card"><h4>Profit Hari Ini</h4><div class="val">Rp 0</div></div>
            <div class="stat-card"><h4>Profit Bulan Ini</h4><div class="val">Rp 0</div></div>
        </div>
    </div>

    <script>
        const DB_URL = "https://raw.githubusercontent.com/Dikaajak/pay-h2h/refs/heads/main/user.json";
        
        function toggleS() { document.getElementById('sb').classList.toggle('open'); document.getElementById('ov').classList.toggle('show'); }
        function openM(id) { closeAll(); document.getElementById(id).classList.add('show'); document.getElementById('ov').classList.add('show'); }
        function closeAll() { 
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
            document.getElementById('sb').classList.remove('open');
            document.getElementById('ov').classList.remove('show');
        }

        function copyAPI() { navigator.clipboard.writeText(document.getElementById('m-api').innerText); alert("API Key Salin!"); }

        async function createQris() {
            const nom = document.getElementById('inNom').value;
            if(!nom || nom < 1000) return alert("Min 1.000");
            
            const btn = document.getElementById('btnQ');
            btn.innerText = "Memproses..."; btn.disabled = true;

            try {
                const r = await fetch('/api/qris', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nominal: nom })
                });
                const res = await r.json();
                if(res.status) {
                    document.getElementById('qRes').style.display = "block";
                    document.getElementById('qImg').src = res.data.qr_image;
                    document.getElementById('qStat').innerText = "STATUS: " + res.data.status.toUpperCase();
                } else { alert("Gagal: " + res.message); }
            } catch (e) { alert("Error Server"); }
            finally { btn.innerText = "Proses Sekarang"; btn.disabled = false; }
        }

        async function init() {
            const mail = localStorage.getItem('user_email');
            if(!mail) window.location.href = "login.html";
            try {
                const r = await fetch(DB_URL);
                const u = await r.json();
                const d = u.find(x => x.email === mail);
                if(d) {
                    const n = d.email.split('@')[0].toUpperCase();
                    document.getElementById('p-u').innerText = n;
                    document.getElementById('m-n').innerText = n;
                    document.getElementById('m-e').innerText = d.email;
                    
                    let api = localStorage.getItem('user_api');
                    if(!api) { 
                        api = "nexapedia-" + Math.random().toString(36).substr(2, 9).toUpperCase();
                        localStorage.setItem('user_api', api);
                    }
                    document.getElementById('m-api').innerText = api;
                } else { logout(); }
            } catch(e) {}
        }

        function logout() { localStorage.removeItem('user_email'); window.location.href = "login.html"; }
        init();
    </script>
</body>
</html>
